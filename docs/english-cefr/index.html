<html lang="en">

<meta charset="UTF-8" />

<style>
/* ==========================================================================
   Quiz Hub — shared engine styles.
   One system for every quiz. Per-quiz accent is injected as --accent at boot.
   The page background is always paper, so everything outside the ink result
   card is styled dark-on-paper for guaranteed contrast, whatever the host.
   ========================================================================== */
:root {
  --ink: #1B2A41;
  --ink-soft: #2A3B54;
  --paper: #F7F4EC;
  --paper-deep: #EFE9DC;
  --brass: #B08432;
  --brass-light: #C99A3E;
  --accent: var(--brass);          /* overridden per quiz */
  --accent-light: var(--brass-light);
  --line: #D8D0BE;
  --correct: #3F6B4A;
  --wrong: #B04A3A;
  --muted: #6B6558;
  --muted-soft: #8A836F;
  --serif: Georgia, 'Times New Roman', serif;
  --sans: 'Helvetica Neue', Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
  -webkit-font-smoothing: antialiased;
}
.wrap { width: 100%; max-width: 620px; }

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: clamp(28px, 6vw, 56px);
}

.eyebrow {
  font-size: 12px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 18px;
}

h1.title {
  font-family: var(--serif);
  font-size: clamp(30px, 7vw, 46px);
  line-height: 1.08;
  margin: 0 0 18px;
  font-weight: 700;
}
.rule { width: 46px; height: 2px; background: var(--accent); margin: 0 0 20px; }
.center { text-align: center; }
.center .rule { margin-left: auto; margin-right: auto; }

p.lead {
  font-size: 16px;
  line-height: 1.6;
  color: var(--muted);
  max-width: 440px;
  margin: 0 auto 30px;
}

/* buttons ------------------------------------------------------------------ */
.btn {
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 3px;
  padding: 15px 34px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.03em;
  cursor: pointer;
  font-family: var(--sans);
  transition: opacity 0.15s ease;
}
.btn:hover { opacity: 0.9; }
.btn.full { width: 100%; }
/* ghost is styled dark-on-paper so it stays visible on the paper page */
.btn.ghost {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--line);
  padding: 12px 28px;
  font-size: 14px;
}
.btn.ghost:hover { border-color: var(--accent); color: var(--accent); opacity: 1; }
.btn.link {
  background: transparent;
  color: var(--muted);
  border: none;
  padding: 8px 12px;
  font-size: 13px;
  text-decoration: underline;
  text-underline-offset: 3px;
  cursor: pointer;
  font-family: var(--sans);
}
.btn.link:hover { color: var(--ink); }

/* intro variant chooser ---------------------------------------------------- */
.modes { display: grid; gap: 14px; margin-bottom: 12px; }
.mode {
  text-align: left;
  background: transparent;
  border: 1.5px solid var(--line);
  border-radius: 3px;
  padding: 20px 22px;
  cursor: pointer;
  font-family: var(--sans);
  color: var(--ink);
  transition: border-color 0.15s ease, background 0.15s ease;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.mode:hover { border-color: var(--accent); background: rgba(176,132,50,0.04); }
.mode .mode-name { font-family: var(--serif); font-size: 19px; font-weight: 700; }
.mode .mode-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
.mode .mode-count {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  white-space: nowrap;
  text-align: center;
}
.mode .mode-count span {
  font-size: 12px; font-family: var(--sans); display: block; color: var(--muted);
  letter-spacing: 0.14em; text-transform: uppercase; margin-top: 4px;
}
.single-start { margin-bottom: 12px; }
.single-start .start-meta { font-size: 13px; color: var(--muted); margin-top: 14px; }

/* quiz --------------------------------------------------------------------- */
.qhead { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.qlabel { font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
.qcount { font-size: 12px; color: var(--muted); }
.qtimer {
  font-family: var(--serif); font-size: 22px; font-weight: 700; line-height: 1;
  color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
}
.qtimer.low { color: var(--wrong); }
.track { height: 3px; background: var(--paper-deep); border-radius: 2px; margin-bottom: 30px; overflow: hidden; }
.fill { height: 100%; background: var(--accent); width: 0; transition: width 0.35s ease; }
h2.q { font-family: var(--serif); font-size: clamp(20px, 4.5vw, 26px); line-height: 1.35; margin: 0 0 26px; font-weight: 700; }

.opts { display: grid; gap: 12px; }
.opt {
  text-align: left;
  padding: 15px 18px;
  border-radius: 3px;
  border: 1.5px solid var(--line);
  background: transparent;
  color: var(--ink);
  font-size: 16px;
  font-family: var(--sans);
  cursor: pointer;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  gap: 12px;
}
.opt:hover:not(:disabled) { border-color: var(--accent); }
.opt:disabled { cursor: default; }
.opt .letter { font-family: var(--serif); font-weight: 700; color: var(--accent); min-width: 18px; }
/* ladder / tally feedback */
.opt.correct { background: rgba(63,107,74,0.10); border-color: var(--correct); color: var(--correct); }
.opt.correct .letter { color: var(--correct); }
.opt.wrong { background: rgba(176,74,58,0.08); border-color: var(--wrong); color: var(--wrong); }
.opt.wrong .letter { color: var(--wrong); }
.opt.dim { color: var(--muted); }
/* archetype: no right/wrong, just a chosen state */
.opt.picked { background: rgba(176,132,50,0.10); border-color: var(--accent); color: var(--ink); }

/* result ------------------------------------------------------------------- */
.result-card {
  background: var(--ink);
  color: var(--paper);
  border-radius: 4px;
  padding: clamp(32px, 7vw, 52px);
  text-align: center;
  position: relative;
  box-shadow: 0 20px 50px rgba(27,42,65,0.25);
}
.result-card .frame { position: absolute; inset: 10px; border: 1px solid var(--accent); opacity: 0.42; border-radius: 2px; pointer-events: none; }
.result-card .r-eyebrow { font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--accent-light); font-weight: 700; margin-bottom: 24px; }
.result-card .r-awarded { font-family: var(--serif); font-style: italic; font-size: 15px; color: rgba(247,244,236,0.8); margin: 0 0 18px; }
.result-card .r-awarded:empty { display: none; }
.result-card .headline {
  font-family: var(--serif);
  font-weight: 700;
  line-height: 0.94;
  letter-spacing: -0.02em;
  color: var(--paper);
  word-break: break-word;
}
.headline.monogram { font-size: clamp(72px, 18vw, 120px); line-height: 0.9; }
.headline.name     { font-size: clamp(32px, 7.5vw, 54px); line-height: 1.02; }
.headline.score    { font-size: clamp(56px, 15vw, 88px); line-height: 0.9; }
.result-card .subhead { font-family: var(--serif); font-size: clamp(19px, 5vw, 27px); color: var(--accent-light); margin: 10px 0 22px; font-style: italic; }
.result-card .rrule { width: 46px; height: 2px; background: var(--accent); margin: 0 auto 22px; }
.result-card p.blurb { font-size: 15px; line-height: 1.65; color: rgba(247,244,236,0.85); max-width: 400px; margin: 0 auto 26px; }
.stats { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
.stat .val { font-family: var(--serif); font-size: 26px; font-weight: 700; }
.stat .lab { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent-light); margin-top: 4px; }

/* on-screen quadrant map (matches the grid drawn on the certificate) */
.quad-svg { width: 100%; max-width: 300px; height: auto; margin: 8px auto 0; display: block; }
.qs-frame { fill: none; stroke: var(--accent); stroke-opacity: 0.5; stroke-width: 1.2; }
.qs-axis { stroke: var(--accent); stroke-opacity: 0.28; stroke-width: 1; }
.qs-corner { fill: rgba(247,244,236,0.34); font-family: var(--serif); font-style: italic; font-size: 11px; }
.qs-pole { fill: var(--accent-light); font-family: var(--sans); font-weight: 700; font-size: 9.5px; letter-spacing: 0.16em; }
.qs-dot-ring { fill: var(--accent); }
.qs-dot-core { fill: var(--paper); }

/* after the result — on the paper page, so dark-on-paper for contrast ------- */
.after { margin-top: 24px; text-align: center; }
.after p { font-size: 15px; color: var(--muted); line-height: 1.6; margin: 0 0 18px; }
.after p strong { color: var(--ink); }
.after .row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.after .primary-row { margin-bottom: 20px; }
.share-hint { font-size: 12.5px; color: var(--muted-soft); margin-top: -6px; margin-bottom: 18px; }
.saved-note { font-size: 13px; color: var(--muted-soft); margin-top: 16px; text-align: center; }

/* optional name for the certificate — on paper, so dark-on-paper */
.name-field { margin: 0 auto 22px; max-width: 340px; text-align: center; }
.name-field label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 8px; }
.name-field input {
  width: 100%; padding: 11px 14px; font-size: 15px; font-family: var(--sans);
  color: var(--ink); background: var(--paper); border: 1.5px solid var(--line);
  border-radius: 3px; text-align: center;
}
.name-field input:focus { outline: none; border-color: var(--accent); }
.name-field .name-note { font-size: 11.5px; color: var(--muted-soft); margin-top: 7px; }

/* cross-promotion link back to the hub ------------------------------------- */
.more-quizzes { margin-top: 22px; text-align: center; }
.more-quizzes a {
  font-size: 13px; letter-spacing: 0.04em; color: var(--accent);
  text-decoration: none; border-bottom: 1px solid rgba(176,132,50,0.45); padding-bottom: 1px;
}
.more-quizzes a:hover { border-bottom-color: var(--accent); }

/* footer — on paper, dark-on-paper ---------------------------------------- */
.site-footer { text-align: center; margin-top: 34px; font-size: 13px; color: var(--muted); }
.foot-rule { width: 40px; height: 1px; background: var(--line); margin: 0 auto 18px; }
.site-footer a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(176,132,50,0.5); padding-bottom: 1px; }
.site-footer a:hover { border-bottom-color: var(--accent); }
.site-footer strong { color: var(--ink); font-weight: 600; }
.foot-note { margin-top: 8px; font-size: 12px; color: var(--muted-soft); }

.about-link-wrap { margin-top: 20px; }

/* modal -------------------------------------------------------------------- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(19,28,44,0.6);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; z-index: 50; backdrop-filter: blur(3px);
}
.modal {
  background: var(--paper); border: 1px solid var(--line); border-radius: 4px;
  max-width: 440px; width: 100%; padding: clamp(28px, 6vw, 40px);
  position: relative; text-align: left;
  box-shadow: 0 30px 70px rgba(19,28,44,0.35);
  max-height: 88vh; overflow-y: auto;
}
.modal-close {
  position: absolute; top: 14px; right: 16px; background: none; border: none;
  font-size: 26px; line-height: 1; color: var(--muted); cursor: pointer; padding: 4px;
}
.modal-close:hover { color: var(--ink); }
.modal-title { font-family: var(--serif); font-size: 26px; font-weight: 700; margin: 0 0 14px; }
.modal-body { font-size: 15px; line-height: 1.6; color: var(--ink); margin: 0 0 18px; }
.modal-body.small { font-size: 13.5px; color: var(--muted); }
.modal-body.small strong { color: var(--ink); }
.chip-scale { display: flex; gap: 8px; margin: 0 0 20px; flex-wrap: wrap; }
.chip {
  font-family: var(--serif); font-weight: 700; font-size: 14px;
  color: var(--accent); border: 1px solid var(--line); border-radius: 3px;
  padding: 6px 0; flex: 1; text-align: center; min-width: 42px;
}
.modal-link {
  display: inline-block; font-size: 14px; color: var(--accent); text-decoration: none;
  border-bottom: 1px solid rgba(176,132,50,0.4); padding-bottom: 1px; font-weight: 600;
}
.modal-link:hover { border-bottom-color: var(--accent); }

.hidden { display: none; }

</style>
</head>
<body>
<div class="wrap">
  <!-- INTRO (engine fills) -->
  <div id="intro" class="card center hidden"></div>

  <!-- QUIZ -->
  <div id="quiz" class="card hidden">
    <div class="qhead">
      <span class="qlabel" id="q-label">Question 1</span>
      <span class="qtimer hidden" id="q-timer"></span>
      <span class="qcount" id="q-count">1 / 1</span>
    </div>
    <div class="track"><div class="fill" id="q-fill"></div></div>
    <h2 class="q" id="q-text"></h2>
    <div class="opts" id="q-opts"></div>
    <button class="btn full hidden" id="q-next" style="margin-top:28px;"></button>
  </div>

  <!-- RESULT (engine fills) -->
  <div id="result" class="hidden"></div>

  <!-- ABOUT MODAL (engine fills) -->
  <div id="about-modal" class="modal-overlay hidden"></div>

  <!-- FOOTER (engine fills) -->
  <footer class="site-footer" id="site-footer"></footer>
</div>

<script>
/* ==========================================================================
   Quiz Hub — shared engine.

   One engine, many quizzes. A quiz is a declarative data object registered with
   registerQuiz(). bootQuiz(id) wires it up. Nothing here is quiz-specific.

   Scoring is a strategy that switches on quiz.mode:
     - ladder    weighted questions produce a rank (e.g. CEFR A1..C2)
     - archetype answers add points to types; the top type wins, no bad result
     - tally     right/wrong out of N, mapped to a banded result
   Adding a fourth mode means adding one case to computeOutcome(); quiz data and
   the rest of the engine stay untouched.
   ========================================================================== */
(function () {
  "use strict";

  var QH = (window.QuizHub = window.QuizHub || { quizzes: {} });

  QH.registerQuiz = function (q) {
    QH.quizzes[q.id] = q;
    return q;
  };

  // DOM-free scoring seam. Given a quiz id, variant id, and an array of chosen
  // option indexes, returns the normalized outcome. Used by tests and reusable
  // anywhere scoring is needed without rendering.
  QH.score = function (quizId, variantId, chosen, timing) {
    quiz = QH.quizzes[quizId];
    variant = quiz.variants.filter(function (v) { return v.id === variantId; })[0] || quiz.variants[0];
    questions = variant.questions;
    answers = chosen;
    elapsedSeconds = timing ? timing.seconds : null;
    return computeOutcome();
  };

  // Test seam: render a certificate canvas for given answers (used to verify
  // layout headlessly). Returns the <canvas>. Renderer is defined below.
  QH.renderCertificateFor = function (quizId, variantId, chosen, name, timing) {
    var outcome = QH.score(quizId, variantId, chosen, timing);
    certName = name || "";
    return renderCertificate(outcome);
  };

  // Test seam: the on-screen quadrant map SVG for given answers.
  QH.quadrantSVGFor = function (quizId, variantId, chosen) {
    var o = QH.score(quizId, variantId, chosen);
    return o.grid ? buildQuadrantSVG(o.grid, o.code) : "";
  };

  // ---- small helpers ------------------------------------------------------
  function $(id) { return document.getElementById(id); }
  function setHTML(id, html) { var e = $(id); if (e) e.innerHTML = html; }
  function br(s) { return String(s).replace(/\n/g, "<br />"); }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function fill(tpl, map) {
    return String(tpl == null ? "" : tpl).replace(/\{(\w+)\}/g, function (m, k) {
      return map[k] != null ? map[k] : m;
    });
  }

  // ---- module state (one quiz per page) ----------------------------------
  var quiz = null;         // active quiz definition
  var variant = null;      // active variant object
  var questions = [];      // questions for the active variant
  var idx = 0;
  var answers = [];        // per-question: chosen option index
  var locked = false;
  var lastOutcome = null;  // normalized outcome for share/certificate
  var STORAGE_KEY = "";
  var certName = "";       // optional name drawn on the certificate
  var NAME_KEY = "quizhub-name";   // shared across all quizzes on the hub
  var finished = false;    // guards against double finish
  // whole-quiz stopwatch (timed quizzes only): counts up from 0, no limit
  var timerId = null, timerStart = 0;
  var elapsedSeconds = null;

  // ---- persistence --------------------------------------------------------
  function saveResult(payload) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch (e) {}
  }
  function loadResult() {
    try { var raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
    catch (e) { return null; }
  }
  function clearResult() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  }
  // Name is stored under a shared key, so it carries across every quiz. Reset
  // clears the result but keeps the name (same person often takes several).
  function loadName() { try { return localStorage.getItem(NAME_KEY) || ""; } catch (e) { return ""; } }
  function saveName(v) { try { if (v) localStorage.setItem(NAME_KEY, v); else localStorage.removeItem(NAME_KEY); } catch (e) {} }

  // Anonymous taker counter. Fire-and-forget atomic increments to a Firebase
  // Realtime Database, only if a DB url is configured (window.QUIZHUB_ANALYTICS).
  // Counts EVERY completed session, not once per device: people pass one phone
  // around without resetting, so per-device dedup undercounts real takers.
  // No personal data, no name, no reads.
  function recordResult(quizId, resultKey) {
    var base = (typeof window !== "undefined" && window.QUIZHUB_ANALYTICS) || "";
    if (!base) return;                         // disabled until a DB url is set
    base = base.replace(/\/+$/, "");
    var opts = { method: "PATCH", headers: { "Content-Type": "application/json" }, keepalive: true };
    var resBody = {}; resBody[resultKey] = { ".sv": { increment: 1 } };
    try {
      fetch(base + "/counts/" + quizId + ".json",
        Object.assign({ body: JSON.stringify({ total: { ".sv": { increment: 1 } } }) }, opts)).catch(function () {});
      fetch(base + "/counts/" + quizId + "/results.json",
        Object.assign({ body: JSON.stringify(resBody) }, opts)).catch(function () {});
    } catch (e) {}
  }

  // ---- theming ------------------------------------------------------------
  function applyTheme() {
    var root = document.documentElement.style;
    if (quiz.accent) {
      root.setProperty("--accent", quiz.accent);
      root.setProperty("--accent-light", quiz.accentLight || accentLightFrom(quiz.accent));
    }
    // Per-quiz two-tone palette: a deep ink and a tinted paper. Borders and the
    // deep-paper tone are derived by nudging paper toward the quiz's own ink, so
    // each quiz feels distinct while sharing one layout and type system.
    if (quiz.paper) {
      root.setProperty("--paper", quiz.paper);
      root.setProperty("--paper-deep", mixHex(quiz.paper, quiz.ink || "#1B2A41", 0.07));
      root.setProperty("--line", mixHex(quiz.paper, quiz.ink || "#1B2A41", 0.20));
    }
    if (quiz.ink) root.setProperty("--ink", quiz.ink);
    if (quiz.title) document.title = quiz.title;
  }

  // ===========================================================================
  //  SCORING STRATEGIES  ->  a single normalized Outcome the UI can render.
  //  Outcome = { code, subhead, blurb, stats:[{val,label}], eyebrow,
  //              headlineStyle, caption, raw }
  // ===========================================================================
  function computeOutcome() {
    switch (quiz.mode) {
      case "ladder":    return outcomeLadder();
      case "archetype": return outcomeArchetype();
      case "tally":     return outcomeTally();
      case "quadrant":  return outcomeQuadrant();
      default: throw new Error("Unknown quiz mode: " + quiz.mode);
    }
  }

  function correctCount() {
    var n = 0;
    for (var i = 0; i < questions.length; i++) {
      if (answers[i] === questions[i].correct) n++;
    }
    return n;
  }
  // first band whose threshold `value` falls within (works for counts or %)
  function pickBand(bands, value) {
    var key = bands[bands.length - 1].band;
    for (var j = 0; j < bands.length; j++) { if (value <= bands[j].max) { key = bands[j].band; break; } }
    return key;
  }
  // first entry in a {max,...} list whose max the value falls within; returns the object
  function pickFrom(list, value) {
    for (var j = 0; j < list.length; j++) { if (value <= list[j].max) return list[j]; }
    return list[list.length - 1];
  }

  // ladder: either flat thresholds on the total, or a per-level walk-up.
  function outcomeLadder() {
    var scoring = variant.scoring || quiz.scoring || { type: "thresholds", thresholds: [] };
    var correct = correctCount();
    var level;

    if (scoring.type === "perLevel") {
      var order = quiz.results.levelOrder;
      var per = {};
      order.forEach(function (l) { per[l] = { correct: 0, total: 0 }; });
      questions.forEach(function (qq, i) {
        if (!per[qq.level]) per[qq.level] = { correct: 0, total: 0 };
        per[qq.level].total++;
        if (answers[i] === qq.correct) per[qq.level].correct++;
      });
      // highest level passed, walking up, stopping at the first failure.
      var pass = scoring.passMark || Math.ceil((per[order[0]].total || 6) * 0.67);
      level = order[0];
      var passedAny = false;
      for (var k = 0; k < order.length; k++) {
        if (per[order[k]].correct >= pass) { level = order[k]; passedAny = true; }
        else break;
      }
      if (!passedAny) level = order[0];
    } else {
      // thresholds: first band whose `max` correct-count we fall within.
      var t = scoring.thresholds;
      level = t[t.length - 1].level;
      for (var j = 0; j < t.length; j++) {
        if (correct <= t[j].max) { level = t[j].level; break; }
      }
    }

    var band = quiz.results.bands[level];
    var stats = [{ val: correct + "/" + questions.length, label: "Correct" }];
    if (typeof band.percentile === "number") {
      stats.push({ val: "Top " + (100 - band.percentile) + "%", label: "Among test-takers" });
    }
    return {
      code: level,
      subhead: band.name,
      blurb: band.blurb,
      stats: stats,
      eyebrow: (quiz.certificate && quiz.certificate.eyebrow) || quiz.results.eyebrow || "",
      headlineStyle: (quiz.certificate && quiz.certificate.headlineStyle) || "monogram",
      caption: fill(captionTpl(), { code: level, subhead: band.name, quizTitle: quiz.title, author: authorName() }),
      raw: { level: level, correct: correct, total: questions.length },
    };
  }

  // archetype: sum points per type, rank, name the top with a runner-up.
  function outcomeArchetype() {
    var totals = {};
    Object.keys(quiz.results.types).forEach(function (k) { totals[k] = 0; });
    questions.forEach(function (qq, i) {
      var chosen = qq.options[answers[i]];
      if (chosen && chosen.scores) {
        Object.keys(chosen.scores).forEach(function (k) {
          totals[k] = (totals[k] || 0) + chosen.scores[k];
        });
      }
    });
    var ranked = Object.keys(totals).sort(function (a, b) {
      if (totals[b] !== totals[a]) return totals[b] - totals[a];
      // stable tiebreak by declared order
      return quiz.results.order.indexOf(a) - quiz.results.order.indexOf(b);
    });
    var topKey = ranked[0], secondKey = ranked[1];
    var top = quiz.results.types[topKey];
    var second = quiz.results.types[secondKey];

    // One clear reading: the runner-up type. No opaque percentages.
    var stats = (second && totals[secondKey] > 0)
      ? [{ val: second.name, label: "Runner-up" }]
      : [];
    return {
      code: top.name,
      subhead: top.tagline,
      blurb: top.blurb,
      stats: stats,
      eyebrow: (quiz.certificate && quiz.certificate.eyebrow) || quiz.results.eyebrow || "",
      headlineStyle: (quiz.certificate && quiz.certificate.headlineStyle) || "name",
      caption: fill(captionTpl(), {
        code: top.name, subhead: top.tagline, quizTitle: quiz.title, author: authorName(),
      }),
      raw: { top: topKey, second: secondKey, totals: totals },
    };
  }

  // tally: right/wrong out of N -> a band.
  function outcomeTally() {
    var scoring = variant.scoring || quiz.scoring || {};
    var correct = correctCount();
    var total = questions.length;
    var eb = (quiz.certificate && quiz.certificate.eyebrow) || quiz.results.eyebrow || "";
    var hs = (quiz.certificate && quiz.certificate.headlineStyle) || "score";

    if (elapsedSeconds != null) {
      // Timed (count-up stopwatch): everyone answers all, so the score is out of
      // total with an accuracy adjective. Time is a separate metric, there to
      // chase or ignore.
      var accPct = total > 0 ? Math.round(correct / total * 100) : 0;
      var acc = pickFrom(quiz.results.accuracy, accPct);
      var code = correct + "/" + total;
      return {
        code: code, subhead: acc.adj, blurb: acc.blurb,
        stats: [{ val: fmtTime(elapsedSeconds), label: "Time" }],
        eyebrow: eb, headlineStyle: hs,
        caption: fill(captionTpl(), { code: code, subhead: acc.adj, time: fmtTime(elapsedSeconds), correct: correct, total: total, quizTitle: quiz.title, author: authorName() }),
        raw: { accuracy: accPct, correct: correct, total: total, time: elapsedSeconds },
      };
    }

    // Untimed tally: single band by correct count out of total.
    var key = pickBand(scoring.thresholds || [], correct);
    var band = quiz.results.bands[key];
    var stats2 = [{ val: correct + "/" + total, label: "Correct" }];
    if (band.stat) stats2.push({ val: band.stat, label: band.statLabel || "" });
    return {
      code: correct + "/" + total, subhead: band.name, blurb: band.blurb, stats: stats2, eyebrow: eb, headlineStyle: hs,
      caption: fill(captionTpl(), { code: correct + "/" + total, subhead: band.name, status: "", correct: correct, attempted: total, total: total, time: "", quizTitle: quiz.title, author: authorName() }),
      raw: { band: key, correct: correct, total: total },
    };
  }

  // quadrant: two axes, each summed from option {x,y} deltas. Sign picks the
  // quadrant; magnitude (normalized to [-1,1]) plots the point on the grid.
  function outcomeQuadrant() {
    var ax = quiz.results.axes;
    var X = 0, Y = 0, Xmax = 0, Ymax = 0;
    questions.forEach(function (qq, i) {
      var sc = (qq.options[answers[i]] || {}).scores || {};
      X += sc.x || 0; Y += sc.y || 0;
      var mx = 0, my = 0;
      qq.options.forEach(function (o) {
        var s = o.scores || {};
        mx = Math.max(mx, Math.abs(s.x || 0));
        my = Math.max(my, Math.abs(s.y || 0));
      });
      Xmax += mx; Ymax += my;
    });
    var xNorm = Xmax ? Math.max(-1, Math.min(1, X / Xmax)) : 0;
    var yNorm = Ymax ? Math.max(-1, Math.min(1, Y / Ymax)) : 0;
    var xHigh = X >= 0, yHigh = Y >= 0;
    var xPole = xHigh ? ax.x.high : ax.x.low;
    var yPole = yHigh ? ax.y.high : ax.y.low;
    var key = (xHigh ? ax.x.highKey : ax.x.lowKey) + "-" + (yHigh ? ax.y.highKey : ax.y.lowKey);
    var quad = quiz.results.quadrants[key];

    var quadLabels = {};
    Object.keys(quiz.results.quadrants).forEach(function (k) {
      quadLabels[k] = quiz.results.quadrants[k].name;
    });

    return {
      code: quad.name,
      subhead: quad.tagline,
      blurb: quad.blurb,
      stats: [
        { val: xPole, label: ax.x.label },
        { val: yPole, label: ax.y.label },
      ],
      eyebrow: (quiz.certificate && quiz.certificate.eyebrow) || quiz.results.eyebrow || "",
      headlineStyle: "name",
      kind: "quadrant",
      grid: { xNorm: xNorm, yNorm: yNorm, ax: ax, key: key, quadLabels: quadLabels },
      caption: fill(captionTpl(), { code: quad.name, subhead: quad.tagline, quizTitle: quiz.title, author: authorName() }),
      raw: { x: X, y: Y, xNorm: xNorm, yNorm: yNorm, key: key },
    };
  }

  function authorName() { return (quiz.attribution && quiz.attribution.name) || ""; }
  function captionTpl() {
    return (quiz.certificate && quiz.certificate.caption) ||
      "My result: {code} ({subhead}) on “{quizTitle}”. Take it yourself, created by {author}.";
  }

  // ===========================================================================
  //  INTRO
  // ===========================================================================
  function renderIntro() {
    var i = quiz.intro;
    var variantsHTML;
    if (quiz.variants.length > 1) {
      variantsHTML = '<div class="modes">' + quiz.variants.map(function (v) {
        return '<button class="mode" data-variant="' + esc(v.id) + '">' +
          '<div><div class="mode-name">' + esc(v.name) + '</div>' +
          '<div class="mode-sub">' + esc(v.sub || "") + '</div></div>' +
          '<div class="mode-count">' + v.questions.length + '<span>questions</span></div>' +
          '</button>';
      }).join("") + '</div>';
    } else {
      var v0 = quiz.variants[0];
      variantsHTML = '<div class="single-start">' +
        '<button class="btn full" data-variant="' + esc(v0.id) + '">' +
        esc(i.startLabel || "Begin the test") + '</button>' +
        '<div class="start-meta">' + v0.questions.length + " questions" +
        (i.startMeta ? ", " + esc(i.startMeta) : "") + '</div></div>';
    }

    var aboutHTML = quiz.about
      ? '<div class="about-link-wrap"><button class="btn link about-trigger">' +
        esc(quiz.about.trigger) + '</button></div>'
      : "";

    setHTML("intro",
      '<div class="eyebrow">' + esc(i.eyebrow) + '</div>' +
      '<h1 class="title">' + br(i.headline) + '</h1>' +
      '<div class="rule"></div>' +
      '<p class="lead">' + esc(i.lead) + '</p>' +
      variantsHTML +
      '<div id="prev-cta" class="hidden"><div class="saved-note">You’ve taken this before. ' +
        '<button class="btn link" id="view-saved">View your saved result</button></div></div>' +
      aboutHTML
    );

    $("intro").querySelectorAll("[data-variant]").forEach(function (b) {
      b.addEventListener("click", function () { start(b.getAttribute("data-variant")); });
    });
    var vs = $("view-saved"); if (vs) vs.addEventListener("click", showSaved);
    var at = $("intro").querySelector(".about-trigger");
    if (at) at.addEventListener("click", openAbout);

    refreshIntro();
  }

  function refreshIntro() {
    var saved = loadResult();
    var cta = $("prev-cta");
    if (cta) cta.classList.toggle("hidden", !saved);
  }

  // ===========================================================================
  //  QUIZ FLOW
  // ===========================================================================
  function show(id) {
    ["intro", "quiz", "result"].forEach(function (s) {
      $(s).classList.toggle("hidden", s !== id);
    });
    window.scrollTo(0, 0);
  }

  function start(variantId) {
    variant = quiz.variants.filter(function (v) { return v.id === variantId; })[0] || quiz.variants[0];
    questions = variant.questions;
    idx = 0;
    answers = [];
    locked = false;
    finished = false;
    elapsedSeconds = null;
    show("quiz");
    startTimer();
    renderQuestion();
  }

  // ---- whole-quiz stopwatch ------------------------------------------------
  // Counts up from 0 with no limit. Everyone answers all questions; time is a
  // separate metric, not a gate. So no "ran out of time", ever.
  function activeTimer() { return (variant && variant.timer) || quiz.timer || null; }
  function fmtTime(s) {                             // always MM:SS
    s = Math.max(0, Math.round(s));
    var m = Math.floor(s / 60), r = s % 60;
    return m + ":" + (r < 10 ? "0" : "") + r;
  }
  function startTimer() {
    var t = activeTimer(), tEl = $("q-timer"), cEl = $("q-count");
    if (tEl) tEl.classList.toggle("hidden", !t);
    if (cEl) cEl.classList.toggle("hidden", !!t);   // timed quizzes show the clock, not the count
    if (timerId) { clearInterval(timerId); timerId = null; }
    if (!t) return;
    timerStart = Date.now();
    updateTimer();
    timerId = setInterval(updateTimer, 250);
  }
  function updateTimer() {
    var tEl = $("q-timer");
    if (tEl) tEl.textContent = fmtTime((Date.now() - timerStart) / 1000);
  }
  function stopTimer() {
    if (timerId) { clearInterval(timerId); timerId = null; }
    if (!activeTimer()) return null;
    return Math.round((Date.now() - timerStart) / 1000);
  }

  function renderQuestion() {
    var qq = questions[idx];
    $("q-label").textContent = "Question " + (idx + 1);
    $("q-count").textContent = (idx + 1) + " / " + questions.length;
    $("q-fill").style.width = (idx / questions.length * 100) + "%";
    $("q-text").textContent = qq.q;

    var optsEl = $("q-opts");
    optsEl.innerHTML = "";
    var opts = qq.options.map(function (o) { return typeof o === "string" ? o : o.text; });
    opts.forEach(function (text, i) {
      var b = document.createElement("button");
      b.className = "opt";
      b.onclick = function () { choose(i); };
      var letter = document.createElement("span");
      letter.className = "letter";
      letter.textContent = String.fromCharCode(65 + i);
      b.appendChild(letter);
      b.appendChild(document.createTextNode(text));
      optsEl.appendChild(b);
    });

    $("q-next").classList.add("hidden");
    locked = false;
  }

  var showsFeedback = function () { return quiz.mode === "ladder" || quiz.mode === "tally"; };

  function choose(i) {
    if (locked) return;
    locked = true;
    answers[idx] = i;
    var qq = questions[idx];
    var buttons = $("q-opts").querySelectorAll(".opt");

    // Feedback modes mark only the chosen answer green or red. The correct
    // answer is NOT revealed, so the quiz reads as an assessment, not a drill.
    // A quiz can opt into revealing the right answer with revealCorrect: true.
    var reveal = quiz.revealCorrect === true;
    buttons.forEach(function (b, bi) {
      b.disabled = true;
      if (showsFeedback()) {
        if (bi === i) b.classList.add(i === qq.correct ? "correct" : "wrong");
        else if (reveal && bi === qq.correct) b.classList.add("correct");
        else b.classList.add("dim");
      } else {
        if (bi === i) b.classList.add("picked");
        else b.classList.add("dim");
      }
    });

    $("q-fill").style.width = ((idx + 1) / questions.length * 100) + "%";
    if (activeTimer()) {
      // sprint: brief green/red flash, then advance automatically, no Next button
      setTimeout(next, 300);
    } else {
      var nextBtn = $("q-next");
      nextBtn.textContent = (idx + 1 === questions.length) ? "See my result" : "Next question";
      nextBtn.classList.remove("hidden");
    }
  }

  function next() {
    if (finished) return;                       // the clock may have ended it first
    if (idx + 1 < questions.length) { idx++; renderQuestion(); }
    else finish();
  }

  function finish() {
    if (finished) return;
    finished = true;
    elapsedSeconds = stopTimer();               // null when untimed
    var outcome = computeOutcome();
    var payload = {
      code: outcome.code, subhead: outcome.subhead, blurb: outcome.blurb,
      stats: outcome.stats, eyebrow: outcome.eyebrow, headlineStyle: outcome.headlineStyle,
      caption: outcome.caption, variantId: variant.id, date: new Date().toISOString(),
      kind: outcome.kind || null, grid: outcome.grid || null,
    };
    saveResult(payload);
    var resultKey = String(outcome.code).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "result";
    recordResult(quiz.id, resultKey);
    renderResult(payload, true);
  }

  // ===========================================================================
  //  RESULT
  // ===========================================================================
  // On-screen quadrant map: an SVG twin of the grid drawn on the certificate,
  // so the result page shows the same 2x2 and plotted point as the download.
  function buildQuadrantSVG(g, aria) {
    var ax = g.ax, L = g.quadLabels;
    var x0 = 42, y0 = 40, S = 224, ip = 18, IS = S - 2 * ip;
    var px = x0 + ip + (g.xNorm + 1) / 2 * IS;
    var py = y0 + ip + (1 - (g.yNorm + 1) / 2) * IS;
    var cx = x0 + S / 2, cy = y0 + S / 2;
    var pole = function (t, x, y, a) {
      return '<text x="' + x + '" y="' + y + '" text-anchor="' + a + '" class="qs-pole">' + esc(t.toUpperCase()) + '</text>';
    };
    var corner = function (k, x, y) {
      return '<text x="' + x + '" y="' + y + '" text-anchor="middle" class="qs-corner">' + esc(L[k]) + '</text>';
    };
    return '<svg class="quad-svg" viewBox="0 0 310 300" role="img" aria-label="' + esc(aria) + '">' +
      '<rect x="' + x0 + '" y="' + y0 + '" width="' + S + '" height="' + S + '" class="qs-frame"/>' +
      '<line x1="' + cx + '" y1="' + y0 + '" x2="' + cx + '" y2="' + (y0 + S) + '" class="qs-axis"/>' +
      '<line x1="' + x0 + '" y1="' + cy + '" x2="' + (x0 + S) + '" y2="' + cy + '" class="qs-axis"/>' +
      corner(ax.x.lowKey + "-" + ax.y.highKey, x0 + S * 0.27, y0 + 22) +
      corner(ax.x.highKey + "-" + ax.y.highKey, x0 + S * 0.73, y0 + 22) +
      corner(ax.x.lowKey + "-" + ax.y.lowKey, x0 + S * 0.27, y0 + S - 12) +
      corner(ax.x.highKey + "-" + ax.y.lowKey, x0 + S * 0.73, y0 + S - 12) +
      pole(ax.y.high, cx, y0 - 10, "middle") +
      pole(ax.y.low, cx, y0 + S + 20, "middle") +
      pole(ax.x.low, x0 - 8, cy + 3, "end") +
      pole(ax.x.high, x0 + S + 8, cy + 3, "start") +
      '<circle cx="' + px + '" cy="' + py + '" r="8" class="qs-dot-ring"/>' +
      '<circle cx="' + px + '" cy="' + py + '" r="3.2" class="qs-dot-core"/>' +
      '</svg>';
  }

  function renderResult(payload, justFinished) {
    lastOutcome = payload;
    // quadrant shows the map; every other mode shows its stat pair
    var bodyHTML = (payload.kind === "quadrant" && payload.grid)
      ? buildQuadrantSVG(payload.grid, payload.code + ", " + payload.subhead)
      : '<div class="stats">' + (payload.stats || []).map(function (s) {
          return '<div class="stat"><div class="val">' + esc(s.val) + '</div>' +
            '<div class="lab">' + esc(s.label) + '</div></div>';
        }).join("") + '</div>';

    var att = quiz.attribution || {};
    var moreHTML = quiz.hubHref
      ? '<div class="more-quizzes"><a href="' + esc(quiz.hubHref) + '">' +
        esc(quiz.moreLabel || "More quizzes") + " →</a></div>"
      : "";

    setHTML("result",
      '<div class="result-card" id="result-card">' +
        '<div class="frame"></div>' +
        '<div class="r-eyebrow">' + esc(payload.eyebrow) + '</div>' +
        '<div class="r-awarded" id="r-awarded"></div>' +
        '<div class="headline ' + esc(payload.headlineStyle) + '">' + esc(payload.code) + '</div>' +
        '<div class="subhead">' + esc(payload.subhead) + '</div>' +
        '<div class="rrule"></div>' +
        '<p class="blurb">' + esc(payload.blurb) + '</p>' +
        bodyHTML +
      '</div>' +
      '<div class="after">' +
        '<div class="name-field">' +
          '<label for="cert-name">Add your name to the certificate (optional)</label>' +
          '<input id="cert-name" type="text" maxlength="40" placeholder="Your name" autocomplete="name" />' +
          '<div class="name-note">Stays on your device. Appears on the image you download or share.</div>' +
        '</div>' +
        '<div class="row primary-row">' +
          '<button class="btn" id="share-btn">' + esc(quiz.shareLabel || "Share my result") + '</button>' +
          '<button class="btn ghost" id="download-btn">Download image</button>' +
        '</div>' +
        (quiz.result && quiz.result.tagPrompt ? '<p>' + quiz.result.tagPrompt + '</p>' : "") +
        '<div class="row">' +
          '<button class="btn ghost" id="again-btn">Take it again</button>' +
          '<button class="btn ghost" id="reset-btn">Reset for someone else</button>' +
        '</div>' +
        moreHTML +
        '<div class="saved-note" id="save-status"></div>' +
      '</div>'
    );

    $("share-btn").addEventListener("click", shareCard);
    $("download-btn").addEventListener("click", downloadCard);
    $("again-btn").addEventListener("click", takeAgain);
    $("reset-btn").addEventListener("click", resetForOther);

    // optional name: prefill from the shared key, update live on the card
    certName = loadName();
    var nameInput = $("cert-name");
    if (nameInput) {
      nameInput.value = certName;
      updateAwarded();
      nameInput.addEventListener("input", function () {
        certName = this.value.trim();
        saveName(certName);
        updateAwarded();
      });
    }

    var status = $("save-status");
    if (justFinished) {
      status.textContent = "Result saved to this device.";
    } else {
      var d = payload.date ? new Date(payload.date) : null;
      status.textContent = d ? "Saved on " + d.toLocaleDateString() : "";
    }
    show("result");
  }

  function updateAwarded() {
    var el = $("r-awarded");
    if (el) el.textContent = certName ? "Awarded to " + certName : "";
  }

  // Same person retaking: keep their name prefilled.
  function takeAgain() { clearResult(); show("intro"); refreshIntro(); }
  // A different person: clear the name so they start fresh.
  function resetForOther() { clearResult(); saveName(""); show("intro"); refreshIntro(); }

  function showSaved() {
    var saved = loadResult();
    if (saved) renderResult(saved, false);
  }

  // ===========================================================================
  //  CERTIFICATE  (canvas -> PNG, attribution baked in, 2x for crispness)
  //  Headline font auto-fits so it never clips, from a 2-char level code up to
  //  a long archetype name.
  // ===========================================================================
  function wrapText(ctx, text, maxWidth) {
    var words = text.split(" "), lines = [], line = "";
    for (var i = 0; i < words.length; i++) {
      var test = line ? line + " " + words[i] : words[i];
      if (ctx.measureText(test).width > maxWidth && line) { lines.push(line); line = words[i]; }
      else line = test;
    }
    if (line) lines.push(line);
    return lines;
  }
  // largest font size (down to min) that fits `text` in `maxWidth`.
  function fitFont(ctx, text, maxWidth, maxSize, minSize, fontFor) {
    for (var s = maxSize; s > minSize; s -= 2) {
      ctx.font = fontFor(s);
      if (ctx.measureText(text).width <= maxWidth) return s;
    }
    return minSize;
  }

  function renderCertificate(payload) {
    var S = 2, W = 640, H = 800;
    var canvas = document.createElement("canvas");
    canvas.width = W * S; canvas.height = H * S;
    var ctx = canvas.getContext("2d");
    ctx.scale(S, S);

    var INK = quiz.ink || "#1B2A41", PAPER = quiz.paper || "#F7F4EC";
    var ACCENT = quiz.accent || "#B08432";
    var ACCENT_L = quiz.accentLight || accentLightFrom(ACCENT);
    var innerW = W - 160;
    var cx = W / 2;

    ctx.fillStyle = INK; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = hexA(ACCENT, 0.45); ctx.lineWidth = 1.5;
    ctx.strokeRect(24, 24, W - 48, H - 48);
    ctx.textAlign = "center";

    // eyebrow (letter-spaced by hand for canvas)
    ctx.fillStyle = ACCENT_L;
    ctx.font = "700 13px Helvetica, Arial, sans-serif";
    ctx.fillText(spaced(payload.eyebrow.toUpperCase()), cx, 92);

    // optional name, in the gap between eyebrow and headline; fits to width.
    if (certName) {
      var awarded = "Awarded to " + certName;
      var asz = fitFont(ctx, awarded, innerW, 20, 13, function (s) { return "italic " + s + "px Georgia, serif"; });
      ctx.font = "italic " + asz + "px Georgia, serif";
      ctx.fillStyle = hexA(PAPER, 0.8);
      ctx.fillText(awarded, cx, 124);
    }

    if (payload.kind === "quadrant") {
      renderQuadrantCert(ctx, payload, cx, ACCENT, ACCENT_L, PAPER);
    } else {

    // headline: monogram (huge), name (fit + wrap), or score (large)
    ctx.fillStyle = PAPER;
    var serif = function (s) { return "700 " + s + "px Georgia, 'Times New Roman', serif"; };
    var headlineBottom;
    if (payload.headlineStyle === "monogram") {
      var ms = fitFont(ctx, payload.code, innerW, 150, 60, serif);
      ctx.font = serif(ms);
      ctx.fillText(payload.code, cx, 250);
      headlineBottom = 250;
    } else if (payload.headlineStyle === "name") {
      var ns = fitFont(ctx, payload.code, innerW, 84, 34, serif);
      ctx.font = serif(ns);
      var lines = ctx.measureText(payload.code).width > innerW
        ? wrapText(ctx, payload.code, innerW) : [payload.code];
      var y = 210;
      lines.forEach(function (ln) { ctx.fillText(ln, cx, y); y += ns * 1.05; });
      headlineBottom = y - ns * 0.35;
    } else { // score
      ctx.font = serif(96);
      ctx.fillText(payload.code, cx, 245);
      headlineBottom = 245;
    }

    // subhead (italic serif)
    ctx.fillStyle = ACCENT_L;
    var subSize = fitFont(ctx, payload.subhead, innerW, 32, 18, function (s) {
      return "italic 700 " + s + "px Georgia, serif";
    });
    ctx.font = "italic 700 " + subSize + "px Georgia, serif";
    var subY = headlineBottom + 44;
    ctx.fillText(payload.subhead, cx, subY);

    // rule
    ctx.strokeStyle = ACCENT; ctx.lineWidth = 2;
    var ruleY = subY + 30;
    ctx.beginPath(); ctx.moveTo(cx - 24, ruleY); ctx.lineTo(cx + 24, ruleY); ctx.stroke();

    // blurb: shrink the font (16 -> 12) until the whole wrapped block fits above
    // a hard floor, so a long archetype blurb can never overrun the stats or the
    // attribution baked in below. This is the "must not clip" guarantee.
    var blurbTop = ruleY + 40;
    var blurbFloor = 582;                 // block must end above this
    ctx.fillStyle = hexA(PAPER, 0.85);
    var bSize = 16, blurbLines = [], lineH = 25;
    for (bSize = 16; bSize >= 12; bSize--) {
      ctx.font = bSize + "px Helvetica, Arial, sans-serif";
      lineH = Math.round(bSize * 1.55);
      blurbLines = wrapText(ctx, payload.blurb, innerW);
      if (blurbTop + blurbLines.length * lineH <= blurbFloor) break;
    }
    ctx.font = bSize + "px Helvetica, Arial, sans-serif";
    var by = blurbTop + bSize;
    blurbLines.forEach(function (ln) { ctx.fillText(ln, cx, by); by += lineH; });

    // stats (1 or 2, centered) — follow the blurb but stay clear of attribution.
    var stats = payload.stats || [];
    var statsY = Math.min(620, Math.max(560, by + 34));
    if (stats.length === 1) {
      drawStat(ctx, stats[0], cx, statsY, PAPER, ACCENT);
    } else if (stats.length >= 2) {
      drawStat(ctx, stats[0], cx - 90, statsY, PAPER, ACCENT);
      drawStat(ctx, stats[1], cx + 90, statsY, PAPER, ACCENT);
    }
    } // end standard (non-quadrant) layout

    // attribution baked into the image
    var att = quiz.attribution || {};
    ctx.strokeStyle = hexA(ACCENT, 0.3); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - 20, H - 122); ctx.lineTo(cx + 20, H - 122); ctx.stroke();
    ctx.fillStyle = hexA(PAPER, 0.7);
    ctx.font = "14px Helvetica, Arial, sans-serif";
    ctx.fillText(att.certLine || "Take the quiz yourself", cx, H - 94);
    ctx.fillStyle = ACCENT_L;
    ctx.font = "700 15px Helvetica, Arial, sans-serif";
    ctx.fillText("Created by " + (att.name || ""), cx, H - 70);
    ctx.fillStyle = hexA(PAPER, 0.5);
    ctx.font = "13px Helvetica, Arial, sans-serif";
    ctx.fillText(att.handle || "", cx, H - 48);

    return canvas;
  }

  // quadrant certificate: name + tagline + blurb + a labelled 2x2 with the
  // point plotted. The blurb (the flattering description) matches the screen.
  function renderQuadrantCert(ctx, payload, cx, ACCENT, ACCENT_L, PAPER) {
    var g = payload.grid, ax = g.ax, innerW = 640 - 160;
    var serif = function (s) { return "700 " + s + "px Georgia, 'Times New Roman', serif"; };

    // name + tagline
    ctx.fillStyle = PAPER;
    var ns = fitFont(ctx, payload.code, innerW, 44, 30, serif);
    ctx.font = serif(ns);
    ctx.fillText(payload.code, cx, 172);
    ctx.fillStyle = ACCENT_L;
    ctx.font = "italic 700 20px Georgia, serif";
    ctx.fillText(payload.subhead, cx, 200);

    // blurb, shrunk to fit above the grid
    ctx.fillStyle = hexA(PAPER, 0.85);
    var bTop = 228, bFloor = 374, bSize, bLines = [], lineH = 24;
    for (bSize = 16; bSize >= 11; bSize--) {
      ctx.font = bSize + "px Helvetica, Arial, sans-serif";
      lineH = Math.round(bSize * 1.5);
      bLines = wrapText(ctx, payload.blurb, innerW);
      if (bTop + bLines.length * lineH <= bFloor) break;
    }
    ctx.font = bSize + "px Helvetica, Arial, sans-serif";
    var by = bTop + bSize;
    bLines.forEach(function (ln) { ctx.fillText(ln, cx, by); by += lineH; });

    // grid
    var G = 224, gx = cx - G / 2, gy = 398, ip = 14, IS = G - 2 * ip;
    ctx.strokeStyle = hexA(ACCENT, 0.5); ctx.lineWidth = 1.5;
    ctx.strokeRect(gx, gy, G, G);
    ctx.strokeStyle = hexA(ACCENT, 0.3); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(gx + G / 2, gy); ctx.lineTo(gx + G / 2, gy + G); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gx, gy + G / 2); ctx.lineTo(gx + G, gy + G / 2); ctx.stroke();
    ctx.fillStyle = hexA(PAPER, 0.30);
    ctx.font = "italic 12px Georgia, serif";
    ctx.textAlign = "center";
    var L = g.quadLabels;
    ctx.fillText(L[ax.x.lowKey + "-" + ax.y.highKey], gx + G * 0.27, gy + 18);
    ctx.fillText(L[ax.x.highKey + "-" + ax.y.highKey], gx + G * 0.73, gy + 18);
    ctx.fillText(L[ax.x.lowKey + "-" + ax.y.lowKey], gx + G * 0.27, gy + G - 10);
    ctx.fillText(L[ax.x.highKey + "-" + ax.y.lowKey], gx + G * 0.73, gy + G - 10);
    ctx.fillStyle = ACCENT_L;
    ctx.font = "700 11px Helvetica, Arial, sans-serif";
    ctx.fillText(spaced(ax.y.high.toUpperCase()), cx, gy - 12);
    ctx.fillText(spaced(ax.y.low.toUpperCase()), cx, gy + G + 22);
    ctx.textAlign = "right"; ctx.fillText(spaced(ax.x.low.toUpperCase()), gx - 12, gy + G / 2 + 4);
    ctx.textAlign = "left"; ctx.fillText(spaced(ax.x.high.toUpperCase()), gx + G + 12, gy + G / 2 + 4);
    ctx.textAlign = "center";
    var px = gx + ip + (g.xNorm + 1) / 2 * IS;
    var py = gy + ip + (1 - (g.yNorm + 1) / 2) * IS;
    ctx.fillStyle = ACCENT;
    ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = PAPER;
    ctx.beginPath(); ctx.arc(px, py, 3.2, 0, Math.PI * 2); ctx.fill();
  }

  function drawStat(ctx, stat, x, y, paper, accent) {
    ctx.fillStyle = paper;
    var vs = fitFont(ctx, String(stat.val), 150, 30, 15, function (s) {
      return "700 " + s + "px Georgia, serif";
    });
    ctx.font = "700 " + vs + "px Georgia, serif";
    ctx.fillText(stat.val, x, y);
    ctx.fillStyle = hexA(accent, 0.9);
    ctx.font = "700 11px Helvetica, Arial, sans-serif";
    ctx.fillText(spaced(String(stat.label).toUpperCase()), x, y + 22);
  }

  // canvas has no letter-spacing; fake it for short all-caps strings.
  function spaced(s) { return s.split("").join(" "); }
  function hexA(hex, a) {
    var h = hex.replace("#", "");
    if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
    var r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    return "rgba(" + r + "," + g + "," + b + "," + a + ")";
  }
  function toRgb(hex) {
    var h = hex.replace("#", "");
    if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
  }
  // blend hex a toward hex b by t (0..1), returns hex
  function mixHex(a, b, t) {
    var x = toRgb(a), y = toRgb(b);
    return "#" + [0, 1, 2].map(function (i) {
      var c = Math.round(x[i] + (y[i] - x[i]) * t).toString(16);
      return c.length === 1 ? "0" + c : c;
    }).join("");
  }
  function accentLightFrom(hex) {
    var h = hex.replace("#", "");
    if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
    var r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    var lift = function (c) { return Math.min(255, Math.round(c + (255 - c) * 0.18)); };
    return "#" + [lift(r), lift(g), lift(b)].map(function (c) {
      var s = c.toString(16); return s.length === 1 ? "0" + s : s;
    }).join("");
  }

  function certificateBlob() {
    return new Promise(function (resolve) {
      renderCertificate(lastOutcome).toBlob(function (blob) { resolve(blob); }, "image/png");
    });
  }
  function fileName() {
    return quiz.id + "-" + String(lastOutcome.code).replace(/[^\w-]+/g, "-").toLowerCase() + ".png";
  }
  function downloadCard() {
    if (!lastOutcome) return;
    var canvas = renderCertificate(lastOutcome);
    var link = document.createElement("a");
    link.download = fileName();
    link.href = canvas.toDataURL("image/png");
    link.click();
  }
  async function shareCard() {
    if (!lastOutcome) return;
    var caption = lastOutcome.caption;
    try {
      var blob = await certificateBlob();
      var file = new File([blob], fileName(), { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], text: caption });
        return;
      }
      if (navigator.share) { await navigator.share({ text: caption }); return; }
      downloadCard();
      try { await navigator.clipboard.writeText(caption); } catch (e) {}
      var status = $("save-status");
      if (status) status.textContent = "Image downloaded and caption copied. Paste it into your post.";
    } catch (e) { /* user cancelled the share sheet, or unsupported; no action */ }
  }

  // ===========================================================================
  //  ABOUT MODAL  (generalized "how this works" — closes on X, outside, Esc)
  // ===========================================================================
  function buildAbout() {
    if (!quiz.about) return;
    var a = quiz.about;
    var bodyParas = Array.isArray(a.body) ? a.body : [a.body];
    var chipsHTML = a.chips
      ? '<div class="chip-scale">' + a.chips.map(function (c) {
          return '<span class="chip">' + esc(c) + "</span>";
        }).join("") + "</div>"
      : "";
    var linkHTML = a.link
      ? '<a class="modal-link" href="' + esc(a.link.href) + '" target="_blank" rel="noopener">' +
        esc(a.link.label) + " →</a>"
      : "";
    setHTML("about-modal",
      '<div class="modal">' +
        '<button class="modal-close" id="about-close" aria-label="Close">&times;</button>' +
        (a.eyebrow ? '<div class="eyebrow">' + esc(a.eyebrow) + "</div>" : "") +
        '<h2 class="modal-title">' + esc(a.title) + "</h2>" +
        '<div class="rule"></div>' +
        bodyParas.map(function (p) { return '<p class="modal-body">' + esc(p) + "</p>"; }).join("") +
        chipsHTML +
        (a.note ? '<p class="modal-body small">' + a.note + "</p>" : "") +
        linkHTML +
      "</div>"
    );
    $("about-modal").addEventListener("click", function (e) {
      if (e.target === $("about-modal")) closeAbout();
    });
    $("about-close").addEventListener("click", closeAbout);
  }
  function openAbout() { $("about-modal").classList.remove("hidden"); }
  function closeAbout() { $("about-modal").classList.add("hidden"); }

  // ===========================================================================
  //  FOOTER
  // ===========================================================================
  function renderFooter() {
    var att = quiz.attribution || {};
    setHTML("site-footer",
      '<div class="foot-rule"></div>' +
      "Made by <strong>" + esc(att.name || "") + "</strong>" +
      (att.linkedin ? ' · <a href="' + esc(att.linkedin) + '" target="_blank" rel="noopener">Connect on LinkedIn</a>' : "") +
      (quiz.honesty ? '<div class="foot-note">' + esc(quiz.honesty) + "</div>" : "")
    );
  }

  // ===========================================================================
  //  BOOT
  // ===========================================================================
  QH.bootQuiz = function (id) {
    quiz = QH.quizzes[id];
    if (!quiz) throw new Error("Quiz not registered: " + id);
    // Cross-link back to the hub only when the build enabled one (else standalone).
    if (typeof window !== "undefined" && window.QUIZHUB_HUB_HREF) quiz.hubHref = window.QUIZHUB_HUB_HREF;
    STORAGE_KEY = "quizhub-" + quiz.id + "-v1";
    applyTheme();
    renderIntro();
    buildAbout();
    renderFooter();
    $("q-next").addEventListener("click", next);
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeAbout();
    });
    show("intro");
  };
})();
