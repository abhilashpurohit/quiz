<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{HUB_TITLE}}</title>
<meta name="description" content="{{HUB_BLURB}}" />
<style>
{{ENGINE_CSS}}

/* ---- hub-specific ---- */
.hub-wrap { width: 100%; max-width: 720px; }
.hub-head { text-align: center; margin-bottom: 40px; }
.hub-head .eyebrow { margin-bottom: 16px; }
.hub-head h1 { font-family: var(--serif); font-size: clamp(32px, 7vw, 50px); line-height: 1.06; margin: 0 0 16px; font-weight: 700; }
.hub-head .rule { margin: 0 auto 20px; }
.hub-head p.lead { margin: 0 auto; }

.grid { display: grid; gap: 16px; grid-template-columns: 1fr; }
@media (min-width: 640px) { .grid { grid-template-columns: 1fr 1fr; } }

.qcard {
  display: block; text-decoration: none; color: inherit;
  background: var(--paper); border: 1px solid var(--line); border-radius: 4px;
  padding: 26px 26px 24px; position: relative; overflow: hidden;
  transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
}
.qcard::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: var(--card-accent, var(--brass));
}
.qcard:hover { border-color: var(--card-accent, var(--brass)); transform: translateY(-2px); box-shadow: 0 14px 34px rgba(27,42,65,0.10); }
.qcard .q-tag {
  font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 700;
  color: var(--card-accent, var(--brass)); margin-bottom: 12px;
}
.qcard h2 { font-family: var(--serif); font-size: 22px; line-height: 1.2; margin: 0 0 10px; font-weight: 700; }
.qcard p { font-size: 14px; line-height: 1.55; color: var(--muted); margin: 0 0 16px; }
.qcard .q-foot { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; color: var(--muted-soft); }
.qcard .q-go { font-weight: 600; color: var(--card-accent, var(--brass)); }

.hub-foot { text-align: center; margin-top: 40px; font-size: 13px; color: var(--muted); }
.hub-foot .foot-rule { margin: 0 auto 18px; }
.hub-foot a { color: var(--brass); text-decoration: none; border-bottom: 1px solid rgba(176,132,50,0.5); padding-bottom: 1px; }
.hub-foot strong { color: var(--ink); font-weight: 600; }
.hub-foot .foot-note { margin-top: 8px; font-size: 12px; color: var(--muted-soft); }
</style>
</head>
<body>
<div class="hub-wrap">
  <header class="hub-head">
    <div class="eyebrow">{{HUB_EYEBROW}}</div>
    <h1>{{HUB_TITLE}}</h1>
    <div class="rule"></div>
    <p class="lead">{{HUB_BLURB}}</p>
  </header>

  <main class="grid" id="grid"></main>

  <footer class="hub-foot">
    <div class="foot-rule"></div>
    Made by <strong>{{AUTHOR}}</strong> ·
    <a href="{{AUTHOR_LINKEDIN}}" target="_blank" rel="noopener">Connect on LinkedIn</a>
    <div class="foot-note">{{HUB_NOTE}}</div>
  </footer>
</div>

<script>
  var QUIZ_MANIFEST = {{MANIFEST}};
  var grid = document.getElementById("grid");
  grid.innerHTML = QUIZ_MANIFEST.map(function (q) {
    return '<a class="qcard" href="' + q.href + '" style="--card-accent:' + q.accent + '">' +
      '<div class="q-tag">' + q.tag + '</div>' +
      '<h2>' + q.title + '</h2>' +
      '<p>' + q.blurb + '</p>' +
      '<div class="q-foot"><span>' + q.count + '</span><span class="q-go">Take it →</span></div>' +
      '</a>';
  }).join("");
</script>
</body>
</html>
